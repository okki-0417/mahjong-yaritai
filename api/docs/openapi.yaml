openapi: 3.0.0
info:
  title: My Rails API
  version: 1.0.0

paths:
  /me:
    get:
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
    patch:
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 20
                profile_text:
                  type: string
                  maxLength: 500
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'

  /me/followings:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - target_user_id
              properties:
                target_user_id:
                  type: integer
      responses:
        '201':
          description: フォロー成功
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'

  /me/followings/{id}:
    delete:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: フォロー解除成功
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'

  /users/{user_id}:
    get:
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/User'
                  - type: object
                    required:
                      - is_followed_by_me
                    properties:
                      is_followed_by_me:
                        type: boolean
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'

  /users/{user_id}/follow_stats:
    get:
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowStats'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'

  /users/{user_id}/followers:
    get:
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'

  /users/{user_id}/followings:
    get:
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'

  /auth/google/callback:
    post:
      summary: Google OAuth認証コールバック
      description: |
        Googleから取得した認証コードを使ってユーザー認証を行う。
        既存ユーザーの場合はアクセストークンを返し、新規ユーザーの場合は暗号化されたメールアドレスを返す。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  description: Googleから取得した認証コード
      responses:
        '201':
          description: 認証成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoogleAuthResponse'
        '400':
          description: 認証コードがない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '422':
          description: トークン交換失敗、ユーザー情報取得失敗、またはAuthRequest保存失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'

  /auth/line/login_url:
    post:
      summary: LINE OAuth認証URL取得
      description: LINE OAuth認証用のログインURLを取得する
      responses:
        '201':
          description: ログインURL作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LineLoginUrlResponse'

  /auth/line/callback:
    post:
      summary: LINE OAuth認証コールバック
      description: |
        LINEから取得した認証コードを使ってユーザー認証を行う。
        既存ユーザーの場合はアクセストークンを返し、新規ユーザーの場合は暗号化されたメールアドレスを返す。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
                - state
                - line_login_id
              properties:
                code:
                  type: string
                  description: LINEから取得した認証コード
                state:
                  type: string
                  description: CSRF対策用のstateパラメータ
                line_login_id:
                  type: string
                  description: 暗号化されたLineLoginレコードID
      responses:
        '201':
          description: 認証成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LineAuthResponse'
        '400':
          description: stateパラメータが無効、または認証コードがない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '422':
          description: トークン交換失敗、IDトークン検証失敗、またはAuthRequest保存失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'

  /what_to_discard_problems:
    get:
      parameters:
        - name: first
          in: query
          required: false
          schema:
            type: integer
            default: 10
        - name: after
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhatToDiscardProblemList'
    post:
      summary: 何切る問題を作成
      description: 新しい何切る問題を作成する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - dora_id
                - hand1_id
                - hand2_id
                - hand3_id
                - hand4_id
                - hand5_id
                - hand6_id
                - hand7_id
                - hand8_id
                - hand9_id
                - hand10_id
                - hand11_id
                - hand12_id
                - hand13_id
                - tsumo_id
              properties:
                round:
                  type: string
                  nullable: true
                turn:
                  type: integer
                  nullable: true
                wind:
                  type: string
                  nullable: true
                points:
                  type: integer
                  nullable: true
                description:
                  type: string
                  nullable: true
                dora_id:
                  type: integer
                hand1_id:
                  type: integer
                hand2_id:
                  type: integer
                hand3_id:
                  type: integer
                hand4_id:
                  type: integer
                hand5_id:
                  type: integer
                hand6_id:
                  type: integer
                hand7_id:
                  type: integer
                hand8_id:
                  type: integer
                hand9_id:
                  type: integer
                hand10_id:
                  type: integer
                hand11_id:
                  type: integer
                hand12_id:
                  type: integer
                hand13_id:
                  type: integer
                tsumo_id:
                  type: integer
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhatToDiscardProblem'
        '401':
          description: 認証エラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /what_to_discard_problems/{id}:
    get:
      summary: 何切る問題を取得
      description: 指定したIDの何切る問題を取得する
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhatToDiscardProblem'
        '404':
          description: 問題が見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: 何切る問題を更新
      description: 自分が作成した何切る問題を更新する
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - dora_id
                - hand1_id
                - hand2_id
                - hand3_id
                - hand4_id
                - hand5_id
                - hand6_id
                - hand7_id
                - hand8_id
                - hand9_id
                - hand10_id
                - hand11_id
                - hand12_id
                - hand13_id
                - tsumo_id
              properties:
                round:
                  type: string
                  nullable: true
                turn:
                  type: integer
                  nullable: true
                wind:
                  type: string
                  nullable: true
                points:
                  type: integer
                  nullable: true
                description:
                  type: string
                  nullable: true
                dora_id:
                  type: integer
                hand1_id:
                  type: integer
                hand2_id:
                  type: integer
                hand3_id:
                  type: integer
                hand4_id:
                  type: integer
                hand5_id:
                  type: integer
                hand6_id:
                  type: integer
                hand7_id:
                  type: integer
                hand8_id:
                  type: integer
                hand9_id:
                  type: integer
                hand10_id:
                  type: integer
                hand11_id:
                  type: integer
                hand12_id:
                  type: integer
                hand13_id:
                  type: integer
                tsumo_id:
                  type: integer
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhatToDiscardProblem'
        '401':
          description: 認証エラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: 問題が見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: 何切る問題を削除
      description: 自分が作成した何切る問題を削除する
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: 削除成功
        '401':
          description: 認証エラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /what_to_discard_problems/{what_to_discard_problem_id}/likes:
    post:
      summary: 何切る問題にいいねする
      description: 指定した何切る問題にいいねを追加する
      parameters:
        - name: what_to_discard_problem_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: いいね作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Like'
        '401':
          description: 認証エラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: 問題が見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: 既にいいね済み
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /what_to_discard_problems/{what_to_discard_problem_id}/likes/{id}:
    delete:
      summary: 何切る問題のいいねを取り消す
      description: 指定した何切る問題のいいねを削除する
      parameters:
        - name: what_to_discard_problem_id
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: いいね削除成功
        '401':
          description: 認証エラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: 問題またはいいねが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /what_to_discard_problems/{what_to_discard_problem_id}/comments:
    get:
      summary: 何切る問題のコメント一覧を取得
      description: 指定した何切る問題の親コメント一覧を取得する
      parameters:
        - name: what_to_discard_problem_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: コメント一覧取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentList'
        '404':
          description: 問題が見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: 何切る問題にコメントする
      description: 指定した何切る問題にコメントを追加する
      parameters:
        - name: what_to_discard_problem_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - comment
              properties:
                comment:
                  type: object
                  required:
                    - content
                  properties:
                    content:
                      type: string
                      maxLength: 500
                    parent_comment_id:
                      type: integer
                      nullable: true
      responses:
        '201':
          description: コメント作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '401':
          description: 認証エラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: 問題が見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /what_to_discard_problems/{what_to_discard_problem_id}/comments/{comment_id}/replies:
    get:
      summary: コメントの返信一覧を取得
      description: 指定したコメントの返信（子コメント）一覧を取得する
      parameters:
        - name: what_to_discard_problem_id
          in: path
          required: true
          schema:
            type: integer
        - name: comment_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 返信一覧取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentList'
        '404':
          description: コメントが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Comment:
      type: object
      required:
        - id
        - content
        - parent_comment_id
        - replies_count
        - created_at
        - commentable_type
        - commentable_id
        - user
      properties:
        id:
          type: integer
        content:
          type: string
        parent_comment_id:
          type: integer
          nullable: true
        replies_count:
          type: integer
        commentable_type:
          type: string
        commentable_id:
          type: integer
        created_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'

    CommentList:
      type: object
      required:
        - comments
      properties:
        comments:
          type: array
          items:
            $ref: '#/components/schemas/Comment'

    Like:
      type: object
      required:
        - id
        - user_id
        - likable_id
        - likable_type
        - created_at
      properties:
        id:
          type: integer
        user_id:
          type: integer
        likable_id:
          type: integer
        likable_type:
          type: string
        created_at:
          type: string
          format: date-time

    User:
      type: object
      required:
        - id
        - name
        - avatar_url
        - profile_text
      properties:
        id:
          type: integer
        name:
          type: string
        avatar_url:
          type: string
          nullable: true
        profile_text:
          type: string
          nullable: true

    FollowStats:
      type: object
      required:
        - following_count
        - followers_count
      properties:
        following_count:
          type: integer
        followers_count:
          type: integer

    UserList:
      type: object
      required:
        - users
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: エラーメッセージ

    Errors:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            type: string

    GoogleAuthResponse:
      type: object
      required:
        - user_name
        - access_token
        - refresh_token
        - encrypted_email
      properties:
        user_name:
          type: string
          nullable: true
          description: ユーザー名（既存ユーザーの場合）
        access_token:
          type: string
          nullable: true
          description: JWTアクセストークン（既存ユーザーの場合）
        refresh_token:
          type: string
          nullable: true
          description: JWTリフレッシュトークン（既存ユーザーの場合）
        encrypted_email:
          type: string
          nullable: true
          description: 暗号化されたメールアドレス（新規ユーザーの場合）

    LineLoginUrlResponse:
      type: object
      required:
        - login_url
        - line_login_id
      properties:
        login_url:
          type: string
          description: LINE OAuth認証URL
        line_login_id:
          type: string
          description: 暗号化されたLineLoginレコードID

    LineAuthResponse:
      type: object
      required:
        - user_name
        - access_token
        - refresh_token
        - encrypted_email
      properties:
        user_name:
          type: string
          nullable: true
          description: ユーザー名（既存ユーザーの場合）
        access_token:
          type: string
          nullable: true
          description: JWTアクセストークン（既存ユーザーの場合）
        refresh_token:
          type: string
          nullable: true
          description: JWTリフレッシュトークン（既存ユーザーの場合）
        encrypted_email:
          type: string
          nullable: true
          description: 暗号化されたメールアドレス（新規ユーザーの場合）

    Session:
      type: object
      required:
        - is_logged_in
      properties:
        is_logged_in:
          type: boolean
          description: ログイン状態
        user_id:
          type: integer
          nullable: true
          description: ユーザーID

    WhatToDiscardProblem:
      type: object
      required:
        - id
        - hand1_id
        - hand2_id
        - hand3_id
        - hand4_id
        - hand5_id
        - hand6_id
        - hand7_id
        - hand8_id
        - hand9_id
        - hand10_id
        - hand11_id
        - hand12_id
        - hand13_id
        - tsumo_id
        - dora_id
        - comments_count
        - likes_count
        - votes_count
        - my_like_id
        - my_vote_tile_id
        - user
        - created_at
      properties:
        id:
          type: integer
        hand1_id:
          type: integer
        hand2_id:
          type: integer
        hand3_id:
          type: integer
        hand4_id:
          type: integer
        hand5_id:
          type: integer
        hand6_id:
          type: integer
        hand7_id:
          type: integer
        hand8_id:
          type: integer
        hand9_id:
          type: integer
        hand10_id:
          type: integer
        hand11_id:
          type: integer
        hand12_id:
          type: integer
        hand13_id:
          type: integer
        tsumo_id:
          type: integer
        dora_id:
          type: integer
        round:
          type: string
          nullable: true
        turn:
          type: integer
          nullable: true
        wind:
          type: string
          nullable: true
        points:
          type: integer
          nullable: true
        description:
          type: string
          nullable: true
        comments_count:
          type: integer
        likes_count:
          type: integer
        votes_count:
          type: integer
        my_like_id:
          type: integer
          nullable: true
        my_vote_tile_id:
          type: integer
          nullable: true
        user:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time

    PageInfo:
      type: object
      required:
        - has_next_page
        - has_previous_page
      properties:
        has_next_page:
          type: boolean
        has_previous_page:
          type: boolean
        start_cursor:
          type: integer
          nullable: true
        end_cursor:
          type: integer
          nullable: true

    WhatToDiscardProblemList:
      type: object
      required:
        - problems
        - page_info
      properties:
        problems:
          type: array
          items:
            $ref: '#/components/schemas/WhatToDiscardProblem'
        page_info:
          $ref: '#/components/schemas/PageInfo'
